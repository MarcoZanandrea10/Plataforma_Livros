<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Marcada</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/icon.png">
</head>

<body data-page="ativos">
    <header>
        <h1>Página Marcada</h1>

        <nav>
            <ul>
                <li class="navs">
                    <a href="index.html" class="nav-link" title="Página inicial">
                        <svg xmlns="http://www.w3.org/2000/svg" class="icon-nav" viewBox="0 0 16 16">
                            <path
                                d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L2 8.207V13.5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5V8.207l.646.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293zM13 7.207V13.5a.5.5 0 0 1-.5.5h-9a.5.5 0 0 1-.5-.5V7.207l5-5z" />
                        </svg>
                    </a>
                </li>

                <li class="navs">
                    <a href="ativos.html" class="nav-link" title="Livros ativos">
                        <svg xmlns="http://www.w3.org/2000/svg" class="icon-nav" viewBox="0 0 16 16">
                            <path
                                d="M1 2.828c.885-.37 2.154-.769 3.388-.893 1.33-.134 2.458.063 3.112.752v9.746c-.935-.53-2.12-.603-3.213-.493-1.18.12-2.37.461-3.287.811zm7.5-.141c.654-.689 1.782-.886 3.112-.752 1.234.124 2.503.523 3.388.893v9.923c-.918-.35-2.107-.692-3.287-.81-1.094-.111-2.278-.039-3.213.492zM8 1.783C7.015.936 5.587.81 4.287.94c-1.514.153-3.042.672-3.994 1.105A.5.5 0 0 0 0 2.5v11a.5.5 0 0 0 .707.455c.882-.4 2.303-.881 3.68-1.02 1.409-.142 2.59.087 3.223.877a.5.5 0 0 0 .78 0c.633-.79 1.814-1.019 3.222-.877 1.378.139 2.8.62 3.681 1.02A.5.5 0 0 0 16 13.5v-11a.5.5 0 0 0-.293-.455c-.952-.433-2.48-.952-3.994-1.105C10.413.809 8.985.936 8 1.783" />
                        </svg>
                    </a>
                </li>

                <li class="navs">
                    <button class="nav-button" id="abrirLogin" title="Login">
                        <svg xmlns="http://www.w3.org/2000/svg" class="icon-nav" viewBox="0 0 16 16">
                            <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0" />
                            <path fill-rule="evenodd"
                                d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1" />
                        </svg>
                    </button>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="pagina-publica" id="paginaPublica">
            <div class="public-card">
                <h2>Seus livros ativos ficam aqui</h2>
                <p>
                    Entre na sua conta para ver apenas os livros que você está lendo no momento.
                </p>

                <button class="btn" data-open-login>Entrar ou criar conta</button>
            </div>
        </section>

        <section class="area-logada escondido" id="areaLogada">
            <section class="hero">
                <h2>Livros ativos</h2>
            </section>

            <section class="container card">
                <div class="lista-header">
                    <h3>Estou lendo</h3>
                    <a href="index.html" class="btn">Adicionar novo livro</a>
                </div>

                <div id="listaLivros" class="livros-grid"></div>
            </section>
        </section>
    </main>

    <div class="modal" id="modalLogin">
        <div class="modal-content">
            <div class="modal-top">
                <h3>Minha conta</h3>
                <button class="fechar" id="fecharLogin" type="button">&times;</button>
            </div>

            <div id="areaAuthVisitante">
                <div class="auth-tabs">
                    <button type="button" id="tabLogin" class="auth-tab ativo">Entrar</button>
                    <button type="button" id="tabCadastro" class="auth-tab">Criar conta</button>
                </div>

                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="usuarioLogin">Usuário</label>
                        <input type="text" id="usuarioLogin" required>
                    </div>

                    <div class="form-group">
                        <label for="senhaLogin">Senha</label>
                        <input type="password" id="senhaLogin" required>
                    </div>

                    <button type="submit" class="btn btn-full">Entrar</button>
                </form>

                <form id="cadastroForm" class="auth-form escondido">
                    <div class="form-group">
                        <label for="nomeCadastro">Nome</label>
                        <input type="text" id="nomeCadastro" required>
                    </div>

                    <div class="form-group">
                        <label for="usuarioCadastro">Usuário</label>
                        <input type="text" id="usuarioCadastro" required>
                    </div>

                    <div class="form-group">
                        <label for="senhaCadastro">Senha</label>
                        <input type="password" id="senhaCadastro" required>
                    </div>

                    <div class="form-group">
                        <label for="confirmarSenhaCadastro">Confirmar senha</label>
                        <input type="password" id="confirmarSenhaCadastro" required>
                    </div>

                    <button type="submit" class="btn btn-full">Criar conta</button>
                </form>
            </div>

            <div id="areaAuthLogado" class="escondido">
                <p class="conta-texto">Você já está conectado neste navegador.</p>
                <button type="button" class="btn btn-danger btn-full" id="btnSair">Sair da conta</button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>

</html>
